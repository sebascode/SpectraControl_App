name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v). Empty for dry-run only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test:
    name: Tests (gate)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of pinning
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: go test
        working-directory: backend
        run: go test ./...
      # tauri.conf.json declara backend/spectractl como bundle.resource — el
      # build.rs de tauri-build valida la ruta a compile-time. Sin el binario
      # presente, "cargo test" falla con "resource path doesn't exist".
      - name: Pre-build Go backend (required by Tauri resource check)
        working-directory: backend
        run: go build -o spectractl .
      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  build:
    name: Build & publish (Linux x86_64)
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            PUBLISH=true
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            PUBLISH=false
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
            PUBLISH=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "→ Version: $VERSION (publish=$PUBLISH)"

      - name: Patch tauri.conf.json with release version
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" \
             '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          echo "→ tauri.conf.json version=$(jq -r .version src-tauri/tauri.conf.json)"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            file \
            wget \
            jq

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of pinning

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build bundles
        env:
          SPECTRA_VERSION: ${{ steps.ver.outputs.version }}
          NO_STRIP: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build --bundles appimage,deb,rpm

      - name: Stage artifacts
        id: stage
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/appimage/*.AppImage \
                   src-tauri/target/release/bundle/appimage/*.AppImage.sig \
                   src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/rpm/*.rpm; do
            cp "$f" dist/
          done
          echo "→ Artefactos:"
          ls -lh dist/

          # Construir latest.json para tauri-plugin-updater.
          # GitHub redirige /releases/latest/download/<file> al asset del tag actual,
          # así que apuntar la URL con /v$VERSION/ deja constancia exacta del release.
          APPIMAGE=$(ls dist/*.AppImage | head -n1)
          SIG=$(ls dist/*.AppImage.sig | head -n1)
          if [[ -z "$APPIMAGE" || -z "$SIG" ]]; then
            echo "❌ Falta AppImage o .sig (¿se configuró TAURI_SIGNING_PRIVATE_KEY?)" >&2
            exit 1
          fi
          ASSET=$(basename "$APPIMAGE")
          SIGNATURE=$(cat "$SIG")
          PUBDATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUBDATE" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$ASSET" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: "See release notes on GitHub",
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": { signature: $signature, url: $url }
              }
            }' > dist/latest.json
          echo "→ latest.json:"
          cat dist/latest.json

          (cd dist && sha256sum *.AppImage *.deb *.rpm > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: Generate Flatpak offline sources
        # Produces the inputs flathub/casa.scode.SpectraControl needs to build
        # offline: cargo-sources.json (every crate from src-tauri/Cargo.lock)
        # and backend-vendor.tar.gz (Go module cache). Published as release
        # assets so the Flathub manifest can reference them by URL+sha256
        # instead of regenerating from a network-enabled checkout.
        run: |
          packaging/flatpak/generate-sources.sh
          cp packaging/flatpak/cargo-sources.json    dist/cargo-sources.json
          cp packaging/flatpak/backend-vendor.tar.gz dist/backend-vendor.tar.gz
          (cd dist && sha256sum cargo-sources.json backend-vendor.tar.gz >> SHA256SUMS)
          echo "→ SHA256SUMS (con sources Flatpak):"
          cat dist/SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: spectracontrol-${{ steps.ver.outputs.version }}-linux-x86_64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.ver.outputs.publish == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SpectraControl ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.AppImage
            dist/*.AppImage.sig
            dist/*.deb
            dist/*.rpm
            dist/latest.json
            dist/cargo-sources.json
            dist/backend-vendor.tar.gz
            dist/SHA256SUMS
